<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Adaptive icon and touch icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Viewport: safe-area support for Android notch / edge-to-edge -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Android TWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Light mode theme-color matches :root --background (hsl(0 0% 100%) = #ffffff) -->
    <!-- Dark mode override for devices that respect prefers-color-scheme -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0b1a" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChronosBooth" />

    <!-- SEO / Social -->
    <title>ChronosBooth — The AI Time Machine</title>
    <meta name="description" content="Transform yourself, your partner, or your whole crew into cinematic portraits from any era with ChronosBooth." />
    <meta property="og:title" content="ChronosBooth — The AI Time Machine" />
    <meta property="og:description" content="Step into any era with AI-powered historical portraits." />
    <meta property="og:image" content="/icons/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Google AdMob / GAM
      AdMob App ID and ad unit IDs are managed centrally in src/lib/appConfig.js (ADMOB_CONFIG).
      Do not hardcode ad IDs in this file. See appConfig.js for the production values.
    -->
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    <script>
      window.googletag = window.googletag || {cmd: []};
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
